<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Category Management — Proposed Model</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7fa;
      --card: #fff;
      --border: #e2e8f0;
      --text: #1a202c;
      --muted: #718096;
      --primary: #5a67d8;
      --primary-light: #ebf0ff;
      --green: #38a169;
      --green-light: #e6ffed;
      --red: #e53e3e;
      --red-light: #ffeaea;
      --amber: #d69e2e;
      --amber-light: #fff9e6;
      --purple: #805ad5;
      --purple-light: #f3e8ff;
      --teal: #319795;
      --teal-light: #e6fffa;
      --radius: 12px;
      --radius-sm: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── HEADER ── */
    .header {
      background: var(--text); color: #fff; padding: 18px 32px;
      display: flex; align-items: center; gap: 16px;
    }
    .header h1 { font-size: 1.2rem; font-weight: 800; }
    .header .subtitle { color: rgba(255,255,255,.5); font-size: .82rem; font-weight: 500; }
    .header .badge-proto { background: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: .7rem; font-weight: 700; margin-left: auto; }

    /* ── LAYOUT ── */
    .layout { display: flex; min-height: calc(100vh - 60px); }
    .panel-left {
      width: 320px; background: var(--card); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: sticky; top: 0; height: calc(100vh - 60px);
    }
    .panel-right { flex: 1; padding: 28px 32px; overflow-y: auto; }

    /* ── LEFT PANEL ── */
    .panel-section-title {
      font-size: .7rem; font-weight: 800; text-transform: uppercase; letter-spacing: .8px;
      color: var(--muted); padding: 16px 20px 8px; display: flex; align-items: center; justify-content: space-between;
    }
    .panel-section-title button {
      background: var(--primary); color: #fff; border: none; width: 22px; height: 22px;
      border-radius: 6px; cursor: pointer; font-size: .85rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-item {
      padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px;
      transition: background .12s; font-size: .88rem; font-weight: 500; border-left: 3px solid transparent;
    }
    .nav-item:hover { background: var(--bg); }
    .nav-item.active { background: var(--primary-light); border-left-color: var(--primary); font-weight: 700; }
    .nav-item .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .nav-item .count {
      margin-left: auto; font-size: .75rem; color: var(--muted); background: var(--bg);
      padding: 1px 8px; border-radius: 10px; font-weight: 600;
    }
    .nav-item.child { padding-left: 44px; font-size: .83rem; color: var(--muted); }
    .nav-item.child.active { color: var(--text); }
    .nav-divider { height: 1px; background: var(--border); margin: 8px 0; }
    .panel-left-scroll { flex: 1; overflow-y: auto; }

    /* ── RIGHT PANEL ── */
    .detail-header { margin-bottom: 24px; }
    .detail-header h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
    .detail-header p { color: var(--muted); font-size: .88rem; }
    .detail-type-badge {
      display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: .72rem;
      font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px;
    }

    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; margin-bottom: 16px;
    }
    .card h3 { font-size: .95rem; font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .card h3 .hint { font-weight: 500; color: var(--muted); font-size: .8rem; }

    /* ── TOGGLE ROW ── */
    .toggle-row {
      display: flex; align-items: center; padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-label { flex: 1; }
    .toggle-label .name { font-weight: 600; font-size: .88rem; }
    .toggle-label .desc { font-size: .78rem; color: var(--muted); margin-top: 1px; }
    .toggle-switch {
      position: relative; width: 44px; height: 24px; flex-shrink: 0; cursor: pointer;
    }
    .toggle-switch input { display: none; }
    .toggle-switch .slider {
      position: absolute; inset: 0; background: #cbd5e0; border-radius: 12px; transition: .2s;
    }
    .toggle-switch .slider::before {
      content: ''; position: absolute; width: 18px; height: 18px;
      border-radius: 50%; background: #fff; top: 3px; left: 3px; transition: .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.15);
    }
    .toggle-switch input:checked + .slider { background: var(--primary); }
    .toggle-switch input:checked + .slider::before { transform: translateX(20px); }

    /* ── GROUP VALUES LIST ── */
    .value-list { display: flex; flex-direction: column; gap: 6px; }
    .value-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      background: var(--bg); border-radius: var(--radius-sm); font-size: .88rem; font-weight: 600;
    }
    .value-item .swatch { width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0; }
    .value-item .badge-toggle {
      margin-left: auto; font-size: .72rem; padding: 3px 10px; border-radius: 6px;
      border: 1.5px solid var(--border); background: #fff; cursor: pointer; font-weight: 700;
      color: var(--muted); transition: all .15s;
    }
    .value-item .badge-toggle.on { background: var(--purple-light); border-color: var(--purple); color: var(--purple); }
    .add-value-row {
      display: flex; gap: 8px; margin-top: 8px;
    }
    .add-value-row input {
      flex: 1; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-family: inherit; font-size: .85rem;
    }
    .add-value-row input:focus { outline: none; border-color: var(--primary); }
    .add-value-row button {
      padding: 8px 16px; background: var(--primary); color: #fff; border: none;
      border-radius: var(--radius-sm); font-weight: 700; font-size: .82rem; cursor: pointer;
    }

    /* ── PREVIEW SECTION ── */
    .preview-area { margin-top: 32px; }
    .preview-area h3 { font-size: 1rem; font-weight: 800; margin-bottom: 16px; }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

    .preview-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; transition: box-shadow .15s;
    }
    .preview-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
    .preview-card-img {
      height: 140px; background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e0 100%);
      position: relative; display: flex; align-items: flex-start; justify-content: flex-end;
      padding: 10px; gap: 6px; flex-wrap: wrap;
    }
    .preview-badge {
      padding: 3px 10px; border-radius: 6px; font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .3px;
    }
    .preview-card-body { padding: 14px; }
    .preview-card-name { font-weight: 800; font-size: .95rem; margin-bottom: 4px; }
    .preview-card-meta { font-size: .78rem; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
    .preview-card-allergens {
      display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap;
    }
    .preview-allergen-pill {
      padding: 2px 8px; border-radius: 4px; font-size: .68rem; font-weight: 600;
      background: var(--red-light); color: var(--red); border: 1px solid rgba(229,62,62,.2);
    }

    /* ── MENU HEADER PREVIEW ── */
    .preview-menu-header {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; margin-bottom: 16px;
    }
    .preview-menu-header .tabs {
      display: flex; gap: 4px; background: var(--bg); border-radius: var(--radius-sm); padding: 4px;
    }
    .preview-menu-header .tab {
      padding: 8px 18px; border-radius: 8px; font-size: .82rem; font-weight: 700; color: var(--muted);
      cursor: pointer; transition: all .15s;
    }
    .preview-menu-header .tab.active { background: var(--card); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .preview-filter-sidebar {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; min-width: 200px;
    }
    .preview-filter-sidebar h4 { font-size: .78rem; font-weight: 800; text-transform: uppercase; color: var(--muted); letter-spacing: .5px; margin-bottom: 10px; }
    .preview-filter-group { margin-bottom: 14px; }
    .preview-filter-group-title { font-size: .82rem; font-weight: 700; margin-bottom: 6px; }
    .preview-filter-option {
      display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: .82rem; color: var(--muted); cursor: pointer;
    }
    .preview-filter-option input[type="checkbox"] { accent-color: var(--primary); }
    .preview-store-layout { display: flex; gap: 20px; }
    .preview-store-main { flex: 1; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .panel-left { width: 100%; position: static; height: auto; max-height: 40vh; }
      .panel-right { padding: 16px; }
      .preview-store-layout { flex-direction: column; }
    }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: .9rem; }

    /* ── INFO CALLOUT ── */
    .callout {
      padding: 14px 18px; border-radius: var(--radius-sm); font-size: .84rem;
      line-height: 1.5; margin-bottom: 16px; display: flex; gap: 10px; align-items: flex-start;
    }
    .callout.info { background: var(--primary-light); color: var(--primary); border: 1px solid rgba(90,103,216,.15); }
    .callout.warn { background: var(--amber-light); color: #92610e; border: 1px solid rgba(214,158,46,.2); }
    .callout .callout-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
  </style>
</head>
<body>

<div class="header">
  <h1>Category Management</h1>
  <span class="subtitle">Proposed Model for Meal Prep Platforms</span>
  <span class="badge-proto">Interactive Prototype</span>
</div>

<div class="layout">

  <!-- LEFT NAV -->
  <div class="panel-left">
    <div class="panel-left-scroll">

      <div class="panel-section-title">
        Groups <span class="hint" style="font-weight:500;font-size:.65rem;letter-spacing:0;text-transform:none;color:#a0aec0">(pick one per group)</span>
        <button onclick="addGroup()" title="Add Custom Group">+</button>
      </div>

      <div id="groupNav"></div>

      <div class="nav-divider"></div>

      <div class="panel-section-title">
        Tags <span class="hint" style="font-weight:500;font-size:.65rem;letter-spacing:0;text-transform:none;color:#a0aec0">(additive, many per dish)</span>
        <button onclick="addLabel()" title="Add Tag">+</button>
      </div>

      <div id="labelNav"></div>

    </div>
  </div>

  <!-- RIGHT DETAIL -->
  <div class="panel-right" id="detailPanel">
    <div class="empty-state">
      <div class="icon">&#9776;</div>
      <p>Select a group or label from the left panel to configure it.</p>
    </div>
  </div>

</div>

<script>
// ── DATA MODEL ──
const VISIBILITY_SPOTS = [
  { key: 'menu_header',  name: 'Menu Header Tabs',    desc: 'Show as navigation tabs across the top of the menu' },
  { key: 'sidebar_filter', name: 'Sidebar Filter',    desc: 'Appear as a filterable option in the sidebar' },
  { key: 'dish_profile', name: 'Dish Profile Page',    desc: 'Display on the individual dish detail page' },
  { key: 'dish_badge',   name: 'Dish Card Badge',      desc: 'Show as a visual badge/pill on the dish card' },
  { key: 'allergen_section', name: 'Allergen Section', desc: 'Appear in the allergen warning area with alert styling' },
];

let groups = [
  {
    id: 'diet_type', name: 'Diet Type', preset: true, color: '#38a169',
    desc: 'Primary diet classification — each dish gets exactly one',
    visibility: { menu_header: false, sidebar_filter: true, dish_profile: true, dish_badge: true, allergen_section: false },
    values: [
      { id: 'meat', name: 'Meat', badge: true },
      { id: 'vegan', name: 'Vegan', badge: true },
      { id: 'pescatarian', name: 'Pescatarian', badge: true },
      { id: 'keto', name: 'Keto', badge: false },
    ]
  },
  {
    id: 'menu_section', name: 'Menu Section', preset: true, color: '#5a67d8',
    desc: 'How the menu is structured — defines the header tabs and sections',
    visibility: { menu_header: true, sidebar_filter: false, dish_profile: true, dish_badge: false, allergen_section: false },
    values: [
      { id: 'entrees', name: 'Entrees', badge: false },
      { id: 'breakfast', name: 'Breakfast', badge: false },
      { id: 'protein_packs', name: 'Protein Packs', badge: false },
      { id: 'snacks', name: 'Power Snacks', badge: false },
      { id: 'family', name: 'Family Meals', badge: false },
    ]
  }
];

let labels = [
  { id: 'gf', name: 'Gluten Free', color: '#e53e3e',
    visibility: { menu_header: false, sidebar_filter: true, dish_profile: true, dish_badge: true, allergen_section: true } },
  { id: 'df', name: 'Dairy Free', color: '#d69e2e',
    visibility: { menu_header: false, sidebar_filter: true, dish_profile: true, dish_badge: true, allergen_section: true } },
  { id: 'nf', name: 'Nut Free', color: '#c05621',
    visibility: { menu_header: false, sidebar_filter: false, dish_profile: true, dish_badge: false, allergen_section: true } },
  { id: 'hp', name: 'High Protein', color: '#805ad5',
    visibility: { menu_header: false, sidebar_filter: true, dish_profile: true, dish_badge: true, allergen_section: false } },
  { id: 'lc', name: 'Low Carb', color: '#319795',
    visibility: { menu_header: false, sidebar_filter: true, dish_profile: true, dish_badge: false, allergen_section: false } },
  { id: 'ff', name: 'Family Friendly', color: '#d53f8c',
    visibility: { menu_header: false, sidebar_filter: true, dish_profile: true, dish_badge: false, allergen_section: false } },
  { id: 'new', name: 'New', color: '#38a169',
    visibility: { menu_header: false, sidebar_filter: false, dish_profile: false, dish_badge: true, allergen_section: false } },
  { id: 'seasonal', name: 'Seasonal', color: '#d69e2e',
    visibility: { menu_header: false, sidebar_filter: false, dish_profile: false, dish_badge: true, allergen_section: false } },
  { id: 'asian', name: 'Asian', color: '#e53e3e',
    visibility: { menu_header: false, sidebar_filter: true, dish_profile: true, dish_badge: false, allergen_section: false } },
  { id: 'mediterranean', name: 'Mediterranean', color: '#3182ce',
    visibility: { menu_header: false, sidebar_filter: true, dish_profile: true, dish_badge: false, allergen_section: false } },
];

let selectedType = null; // 'group' or 'label'
let selectedId = null;

// ── RENDER NAV ──
function renderNav() {
  const gNav = document.getElementById('groupNav');
  gNav.innerHTML = groups.map(g => `
    <div class="nav-item ${selectedType === 'group' && selectedId === g.id ? 'active' : ''}"
         onclick="selectItem('group','${g.id}')">
      <span class="dot" style="background:${g.color}"></span>
      ${g.name}
      ${g.preset ? '<span style="margin-left:auto;font-size:.6rem;background:#e2e8f0;padding:1px 6px;border-radius:4px;font-weight:700;color:#718096">PRESET</span>' : ''}
      <span class="count">${g.values.length}</span>
    </div>
  `).join('');

  const lNav = document.getElementById('labelNav');
  lNav.innerHTML = labels.map(l => `
    <div class="nav-item ${selectedType === 'label' && selectedId === l.id ? 'active' : ''}"
         onclick="selectItem('label','${l.id}')">
      <span class="dot" style="background:${l.color}"></span>
      ${l.name}
    </div>
  `).join('');
}

// ── SELECT ITEM ──
function selectItem(type, id) {
  selectedType = type;
  selectedId = id;
  renderNav();
  renderDetail();
}

// ── RENDER DETAIL ──
function renderDetail() {
  const panel = document.getElementById('detailPanel');

  if (selectedType === 'group') {
    const g = groups.find(x => x.id === selectedId);
    if (!g) return;
    panel.innerHTML = `
      <span class="detail-type-badge" style="background:${g.color}15;color:${g.color}">Group</span>
      <div class="detail-header">
        <h2>${g.name}</h2>
        <p>${g.desc}</p>
      </div>

      <div class="callout info">
        <span class="callout-icon">&#8505;</span>
        <span><strong>Pick-one rule:</strong> Each dish gets exactly one value from this group. A dish can be Meat OR Vegan, never both.</span>
      </div>

      <div class="card">
        <h3>Visibility <span class="hint">Where does this entire group appear?</span></h3>
        ${VISIBILITY_SPOTS.map(v => `
          <div class="toggle-row">
            <div class="toggle-label">
              <div class="name">${v.name}</div>
              <div class="desc">${v.desc}</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" ${g.visibility[v.key] ? 'checked' : ''}
                     onchange="toggleGroupVis('${g.id}','${v.key}', this.checked)">
              <span class="slider"></span>
            </label>
          </div>
        `).join('')}
      </div>

      <div class="card">
        <h3>Values <span class="hint">${g.values.length} options</span></h3>
        <div class="value-list">
          ${g.values.map(v => `
            <div class="value-item">
              <span class="swatch" style="background:${g.color}"></span>
              ${v.name}
              <button class="badge-toggle ${v.badge ? 'on' : ''}"
                      onclick="toggleValueBadge('${g.id}','${v.id}')">
                ${v.badge ? 'BADGE ON' : 'BADGE OFF'}
              </button>
            </div>
          `).join('')}
        </div>
        <div class="add-value-row">
          <input type="text" id="newValueInput" placeholder="Add a value (e.g. Halal)">
          <button onclick="addValue('${g.id}')">Add</button>
        </div>
      </div>

      ${renderPreview()}
    `;
  } else if (selectedType === 'label') {
    const l = labels.find(x => x.id === selectedId);
    if (!l) return;
    panel.innerHTML = `
      <span class="detail-type-badge" style="background:${l.color}15;color:${l.color}">Tag</span>
      <div class="detail-header">
        <h2>${l.name}</h2>
        <p>Additive tag — dishes can have many tags at once</p>
      </div>

      <div class="callout info">
        <span class="callout-icon">&#8505;</span>
        <span><strong>Additive:</strong> Any number of tags can be assigned to a dish. Toggle where this tag appears across your site.</span>
      </div>

      <div class="card">
        <h3>Visibility & Placement</h3>
        ${VISIBILITY_SPOTS.map(v => `
          <div class="toggle-row">
            <div class="toggle-label">
              <div class="name">${v.name}</div>
              <div class="desc">${v.desc}</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" ${l.visibility[v.key] ? 'checked' : ''}
                     onchange="toggleLabelVis('${l.id}','${v.key}', this.checked)">
              <span class="slider"></span>
            </label>
          </div>
        `).join('')}
      </div>

      ${l.visibility.dish_badge ? `
      <div class="card">
        <h3>Badge Style</h3>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <label style="display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg);border-radius:8px;cursor:pointer;border:2px solid var(--primary)">
            <input type="radio" name="badge_style" checked> <span style="font-size:.85rem;font-weight:600">Text Pill</span>
            <span class="preview-badge" style="background:${l.color}18;color:${l.color};margin-left:4px">${l.name}</span>
          </label>
          <label style="display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg);border-radius:8px;cursor:pointer;border:2px solid var(--border)">
            <input type="radio" name="badge_style"> <span style="font-size:.85rem;font-weight:600">Icon</span>
          </label>
          <label style="display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg);border-radius:8px;cursor:pointer;border:2px solid var(--border)">
            <input type="radio" name="badge_style"> <span style="font-size:.85rem;font-weight:600">Custom Image</span>
          </label>
        </div>
      </div>
      ` : ''}

      ${renderPreview()}
    `;
  }
}

// ── ACTIONS ──
function toggleGroupVis(gid, key, val) {
  const g = groups.find(x => x.id === gid);
  g.visibility[key] = val;
  renderDetail();
}

function toggleLabelVis(lid, key, val) {
  const l = labels.find(x => x.id === lid);
  l.visibility[key] = val;
  renderDetail();
}

function toggleValueBadge(gid, vid) {
  const g = groups.find(x => x.id === gid);
  const v = g.values.find(x => x.id === vid);
  v.badge = !v.badge;
  renderDetail();
}

function addValue(gid) {
  const input = document.getElementById('newValueInput');
  const name = input.value.trim();
  if (!name) return;
  const g = groups.find(x => x.id === gid);
  g.values.push({ id: name.toLowerCase().replace(/\s+/g, '_'), name, badge: false });
  input.value = '';
  renderDetail();
  renderNav();
}

function addGroup() {
  const name = prompt('Group name (e.g. Cuisine Type):');
  if (!name) return;
  const id = name.toLowerCase().replace(/\s+/g, '_');
  const colors = ['#e53e3e', '#d69e2e', '#319795', '#d53f8c', '#805ad5', '#c05621'];
  groups.push({
    id, name, preset: false, color: colors[groups.length % colors.length],
    desc: 'Custom group — each dish gets one value',
    visibility: { menu_header: false, sidebar_filter: true, dish_profile: true, dish_badge: false, allergen_section: false },
    values: []
  });
  selectItem('group', id);
}

function addLabel() {
  const name = prompt('Tag name (e.g. Spicy):');
  if (!name) return;
  const id = name.toLowerCase().replace(/\s+/g, '_');
  const colors = ['#e53e3e', '#d69e2e', '#319795', '#d53f8c', '#805ad5', '#3182ce'];
  labels.push({
    id, name, color: colors[labels.length % colors.length],
    visibility: { menu_header: false, sidebar_filter: true, dish_profile: true, dish_badge: false, allergen_section: false }
  });
  selectItem('label', id);
}

// ── LIVE PREVIEW ──
function renderPreview() {
  // Compute what shows where
  const headerTabs = [];
  const filterGroups = [];
  const badgeItems = [];
  const allergenItems = [];

  groups.forEach(g => {
    if (g.visibility.menu_header) {
      g.values.forEach(v => headerTabs.push({ name: v.name, color: g.color }));
    }
    if (g.visibility.sidebar_filter) {
      filterGroups.push({ title: g.name, options: g.values.map(v => v.name) });
    }
    g.values.forEach(v => {
      if (v.badge && g.visibility.dish_badge) badgeItems.push({ name: v.name, color: g.color });
    });
  });

  labels.forEach(l => {
    if (l.visibility.sidebar_filter) {
      // Group tags under "Attributes" in filter
      if (!filterGroups.find(f => f.title === 'Attributes')) {
        filterGroups.push({ title: 'Attributes', options: [] });
      }
      filterGroups.find(f => f.title === 'Attributes').options.push(l.name);
    }
    if (l.visibility.dish_badge) {
      badgeItems.push({ name: l.name, color: l.color });
    }
    if (l.visibility.allergen_section) {
      allergenItems.push({ name: l.name, color: l.color });
    }
  });

  return `
    <div class="preview-area">
      <h3>Live Preview — How This Looks on the Storefront</h3>

      ${headerTabs.length > 0 ? `
      <div class="preview-menu-header">
        <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.5px;margin-bottom:8px">Menu Header</div>
        <div class="tabs">
          ${headerTabs.map((t, i) => `<div class="tab ${i === 0 ? 'active' : ''}">${t.name}</div>`).join('')}
        </div>
      </div>
      ` : ''}

      <div class="preview-store-layout">
        ${filterGroups.length > 0 ? `
        <div class="preview-filter-sidebar">
          <h4>Filters</h4>
          ${filterGroups.map(fg => `
            <div class="preview-filter-group">
              <div class="preview-filter-group-title">${fg.title}</div>
              ${fg.options.map(o => `
                <div class="preview-filter-option"><input type="checkbox"> ${o}</div>
              `).join('')}
            </div>
          `).join('')}
        </div>
        ` : ''}

        <div class="preview-store-main">
          <div class="preview-grid">
            ${renderSampleCard('Herb-Crusted Chicken', badgeItems.slice(0, 2), allergenItems.slice(0, 2), '420 cal')}
            ${renderSampleCard('Buddha Power Bowl', badgeItems.length > 1 ? [badgeItems[1]] : [], allergenItems, '380 cal')}
            ${renderSampleCard('Salmon Teriyaki', badgeItems.slice(0, 1), allergenItems.slice(0, 1), '460 cal')}
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderSampleCard(name, badges, allergens, cal) {
  return `
    <div class="preview-card">
      <div class="preview-card-img">
        ${badges.map(b => `<span class="preview-badge" style="background:${b.color}18;color:${b.color}">${b.name}</span>`).join('')}
      </div>
      <div class="preview-card-body">
        <div class="preview-card-name">${name}</div>
        <div class="preview-card-meta">
          <span>${cal}</span>
          <span>34g protein</span>
        </div>
        ${allergens.length > 0 ? `
        <div class="preview-card-allergens">
          ${allergens.map(a => `<span class="preview-allergen-pill">${a.name}</span>`).join('')}
        </div>
        ` : ''}
      </div>
    </div>
  `;
}

// ── INIT ──
renderNav();
selectItem('group', 'diet_type');
</script>
</body>
</html>
